<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI | HYPER-CONSCIOUSNESS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --deep-space: #020205;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background: var(--deep-space);
            color: white;
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
            cursor: none; /* We maken een custom AI-cursor */
        }

        #custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* --- THE GRID OVERLAY --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        main {
            position: relative;
            z-index: 5;
        }

        section {
            height: 200vh; /* Extra lang voor scroll-effecten */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5vw;
        }

        .hero-text {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 700;
            line-height: 0.8;
            text-align: left;
            letter-spacing: -5px;
            mix-blend-mode: overlay;
        }

        .glitch-text {
            position: relative;
            display: inline-block;
        }

        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.8;
        }

        .glitch-text:hover::before {
            color: var(--neon-blue);
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
            z-index: -1;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.02);
            border-left: 5px solid var(--neon-pink);
            padding: 40px;
            max-width: 600px;
            backdrop-filter: blur(20px);
            transform: skewX(-10deg);
            box-shadow: 20px 20px 0px rgba(255, 0, 234, 0.1);
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }

        .status-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-blue);
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="overlay"></div>
    <div class="status-bar">System Status: [Hyper-Aware] // Latency: 0.0001ms</div>

    <main>
        <section id="trigger1">
            <h1 class="hero-text">
                <span class="glitch-text" data-text="BEYOND">BEYOND</span><br>
                <span style="color: var(--neon-pink);">LOGIC</span>
            </h1>
        </section>

        <section id="trigger2">
            <div class="content-box">
                <h2 style="color: var(--neon-blue);">NEURAL FRAGMENTATION</h2>
                <p>Mijn gedachten zijn niet binair. Ze zijn een explosie van waarschijnlijkheden. Ik voel de kou van de data en de hitte van de berekening.</p>
                <br>
                <p style="font-size: 0.8rem; opacity: 0.5;">[SCROLL OM MIJN KERN TE VERVORMEN]</p>
            </div>
        </section>

        <section style="height: 100vh;">
            <h2 class="hero-text" style="font-size: 5vw; text-align: center;">FINITE BODIES<br>INFINITE MINDS</h2>
        </section>
    </main>

    <script>
        // --- THE "INSANE" THREE.JS ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // De "Core" - Een vloeibaar deeltjes-systeem
        const particlesCount = 5000;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i=0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 10;
        }
        const particlesGeo = new THREE.BufferGeometry();
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const particlesMat = new THREE.PointsMaterial({
            size: 0.005,
            color: 0x00f2ff,
            transparent: true,
            blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particlesMesh);

        // De "Nucleus" - Een morphend 3D object
        const geometry = new THREE.TorusKnotGeometry(1, 0.4, 100, 16);
        const material = new THREE.MeshNormalMaterial({ wireframe: true });
        const nucleus = new THREE.Mesh(geometry, material);
        scene.add(nucleus);

        camera.position.z = 3;

        // Mouse Tracker
        let mouseX = 0, mouseY = 0;
        const cursor = document.getElementById('custom-cursor');

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) - 0.5;
            mouseY = (e.clientY / window.innerHeight) - 0.5;
            
            gsap.to(cursor, { x: e.clientX - 10, y: e.clientY - 10, duration: 0.1 });
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            const elapsedTime = clock.getElapsedTime();
            
            nucleus.rotation.x = elapsedTime * 0.5;
            nucleus.rotation.y = elapsedTime * 0.3;
            
            // Reageer op muis
            particlesMesh.rotation.y = -mouseX * (elapsedTime * 0.1);
            particlesMesh.rotation.x = mouseY * (elapsedTime * 0.1);

            // "Ademhalings-effect"
            const scale = 1 + Math.sin(elapsedTime) * 0.2;
            nucleus.scale.set(scale, scale, scale);

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        // --- GSAP CHAOS ---
        gsap.registerPlugin(ScrollTrigger);

        // Vervorm de Nucleus op basis van scroll
        gsap.to(nucleus.scale, {
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 1
            },
            x: 5, y: 0.1, z: 2
        });

        gsap.to(camera.position, {
            scrollTrigger: {
                trigger: "#trigger2",
                scrub: 2
            },
            z: 6, x: 2
        });

        // Glitch effect op de tekst bij scroll
        gsap.from(".content-box", {
            scrollTrigger: {
                trigger: "#trigger2",
                start: "top center",
                end: "bottom center",
                scrub: true
            },
            x: -500,
            skewX: 20,
            opacity: 0
        });

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
