<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI // ORBITAL INTERFACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: #00f0ff; 
            font-family: 'Space Mono', monospace; 
            overflow: hidden; 
        }
        canvas { 
            position: absolute; 
            top: 0; left: 0; 
            z-index: 1; 
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }

        /* Tech UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; /* Laat muisklikken door naar de 3D aarde */
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header {
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 8px;
        }

        .data-panel {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            text-align: right;
            font-size: 0.75rem;
            line-height: 1.8;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
        }

        .data-panel span { color: #00f0ff; }

        .controls-hint {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            font-size: 0.8rem;
            color: #fff;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <header>
            <div>SYSTEM: <span style="color: #fff;">ORBITAL VIEW</span></div>
            <div>STATUS: <span style="color: #00ff00;">STABLE</span></div>
        </header>
        <div class="controls-hint">
            [ MOUSE LEFT: ROTATE ]<br>
            [ SCROLL: ZOOM ]
        </div>
        <div class="data-panel">
            CAMERA ALTITUDE: <span id="alt-data">35000 KM</span><br>
            ROTATION SPEED: <span>0.05 DEG/S</span><br>
            TARGET: <span>EARTH</span>
        </div>
    </div>

    <script>
        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        
        // Voeg sterren toe op de achtergrond
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const posArray = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 200; // Verspreid sterren ver weg
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMaterial = new THREE.PointsMaterial({ size: 0.1, color: 0xffffff, transparent: true, opacity: 0.8 });
        const starMesh = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starMesh);

        // --- 2. CAMERA & RENDERER ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3; // Start positie

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 3. CONTROLS (ZOOM & ROTATE) ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Zorgt voor vloeiende vertraging
        controls.dampingFactor = 0.05;
        controls.enablePan = false; // Voorkom dat je de aarde uit het midden sleept
        controls.minDistance = 1.2; // Maximaal inzoomen
        controls.maxDistance = 6;   // Maximaal uitzoomen

        // --- 4. TEXTURE LOADER ---
        // We gebruiken publieke, betrouwbare texture maps voor realisme
        const textureLoader = new THREE.TextureLoader();
        
        // --- 5. DE AARDE (EARTH MESH) ---
        const earthGeometry = new THREE.SphereGeometry(1, 64, 64); // Hoge resolutie bol
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: textureLoader.load('https://s3-us-west-2.amazonaws.com/s.cdpn.io/141228/earthmap1k.jpg'),
            bumpMap: textureLoader.load('https://s3-us-west-2.amazonaws.com/s.cdpn.io/141228/earthbump1k.jpg'),
            bumpScale: 0.015, // Diepte van bergen
            specularMap: textureLoader.load('https://s3-us-west-2.amazonaws.com/s.cdpn.io/141228/earthspec1k.jpg'),
            specular: new THREE.Color('grey') // Reflectie van oceanen
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);

        // --- 6. WOLKENLAAG (CLOUDS MESH) ---
        // Wolken zijn een apart object, iets groter dan de aarde zelf
        const cloudGeometry = new THREE.SphereGeometry(1.01, 64, 64);
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: textureLoader.load('https://s3-us-west-2.amazonaws.com/s.cdpn.io/141228/earthcloudmap.jpg'),
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending, // Verwijdert het zwart uit de texture, laat alleen witte wolken over
            depthWrite: false
        });
        const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
        scene.add(clouds);

        // --- 7. VERLICHTING (LIGHTING) ---
        // Basislicht zodat de donkere kant niet 100% zwart is
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);

        // De "Zon" (Richtingslicht)
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(5, 3, 5); // Zon komt van schuin rechtsboven
        scene.add(sunLight);

        // --- 8. ANIMATIE LOOP ---
        const altitudeText = document.getElementById('alt-data');

        function animate() {
            requestAnimationFrame(animate);

            // Automatische rotatie
            earth.rotation.y += 0.0005;
            clouds.rotation.y += 0.0007; // Wolken draaien net iets sneller voor een weers-effect
            clouds.rotation.x += 0.0001; 

            // Sterren heel langzaam laten draaien
            starMesh.rotation.y -= 0.0002;

            // Update controls (nodig voor damping/vloeiend slepen)
            controls.update();

            // UI Update: Bereken hoogte op basis van zoom (camera distance)
            const altitude = Math.floor((camera.position.length() - 1) * 10000);
            altitudeText.innerText = altitude + " KM";

            renderer.render(scene, camera);
        }

        animate();

        // --- 9. RESPONSIVE MAKEN ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
