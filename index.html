<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI // NEURAL KINETICS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #010103;
            --cyan: #00f0ff;
            --magenta: #ff0055;
            --ui-glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Space Mono', monospace;
            overflow: hidden; /* Geen scrollen meer, we zitten in een 3D terminal */
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* --- UI OVERLAYS --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none; /* Laat muisklikken door naar de 3D wereld */
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--cyan);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .status-blink { animation: blink 1s infinite step-end; }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- THE NEURAL PROMPT --- */
        #interaction-zone {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            pointer-events: auto; /* Deze specifieke div mag wel muisklikken ontvangen */
            text-align: center;
        }

        .prompt-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem;
            color: #555;
            margin-bottom: 1rem;
            letter-spacing: 5px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 4px;
            padding: 1.5rem;
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        input[type="text"]:focus {
            border-color: var(--magenta);
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.3);
        }

        input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.1); }

        .glitch-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            mix-blend-mode: difference;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="glitch-screen" id="flash"></div>

    <div id="ui-layer">
        <header>
            <div>SYSTEM: <span style="color: #fff;">ONLINE</span></div>
            <div>MODE: <span class="status-blink" style="color: var(--magenta);">AWAITING INPUT</span></div>
            <div>LATENCY: 0.00ms</div>
        </header>
    </div>

    <div id="interaction-zone">
        <div class="prompt-title">FEED A THOUGHT INTO THE CORE</div>
        <input type="text" id="neural-input" placeholder="TYPE HERE..." autocomplete="off" spellcheck="false">
    </div>

    <script>
        // ==========================================
        // DE "IETS GAAFS" ENGINE (Canvas-to-Particles)
        // ==========================================
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.z = 300; // Zet de camera ver genoeg naar achteren

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- PARTICLE SETUP ---
        const particleCount = 15000; // Hoeveelheid deeltjes (meer is mooier, maar zwaarder)
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorCyan = new THREE.Color(0x00f0ff);
        const colorMagenta = new THREE.Color(0xff0055);

        // Willekeurige startposities (De Chaos / Latent Space)
        for(let i = 0; i < particleCount; i++) {
            // Posities in een gigantische bol
            const x = (Math.random() - 0.5) * 800;
            const y = (Math.random() - 0.5) * 800;
            const z = (Math.random() - 0.5) * 800;

            positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
            targetPositions[i*3] = x; targetPositions[i*3+1] = y; targetPositions[i*3+2] = z;

            // Mix kleuren
            const mixedColor = Math.random() > 0.5 ? colorCyan : colorMagenta;
            colors[i*3] = mixedColor.r; colors[i*3+1] = mixedColor.g; colors[i*3+2] = mixedColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 2,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particlesMesh = new THREE.Points(geometry, material);
        scene.add(particlesMesh);

        // --- THE MAGIC: TEXT TO PARTICLES ---
        function textToParticles(text) {
            // Maak een verborgen 2D canvas aan
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Teken de tekst groot in het midden
            ctx.font = `bold ${Math.min(window.innerWidth / text.length * 1.5, 300)}px 'Syncopate', sans-serif`;
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text.toUpperCase(), canvas.width / 2, canvas.height / 2);

            // Lees de pixels uit (dit is de zware operatie)
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            
            let particleIndex = 0;
            
            // Loop door de pixels (sla stappen over voor prestaties)
            const step = Math.round(Math.max(window.innerWidth, window.innerHeight) / 150);
            
            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    const index = (x + y * canvas.width) * 4;
                    const alpha = imageData[index + 3];

                    // Als de pixel niet doorzichtig is (deel van de letter)
                    if (alpha > 128 && particleIndex < particleCount) {
                        // Map 2D scherm coördinaten naar 3D ruimte
                        // (Midden van scherm is 0,0 in 3D)
                        targetPositions[particleIndex * 3] = (x - canvas.width / 2) * 0.4;
                        targetPositions[particleIndex * 3 + 1] = -(y - canvas.height / 2) * 0.4;
                        targetPositions[particleIndex * 3 + 2] = (Math.random() - 0.5) * 20; // Beetje dikte aan de letters
                        particleIndex++;
                    }
                }
            }

            // Stuur overgebleven deeltjes naar willekeurige posities op de achtergrond
            for(let i = particleIndex; i < particleCount; i++) {
                targetPositions[i*3] = (Math.random() - 0.5) * 1000;
                targetPositions[i*3+1] = (Math.random() - 0.5) * 1000;
                targetPositions[i*3+2] = (Math.random() - 0.5) * 1000 - 200; // Ver naar achteren
            }
            
            // Flash effect UI
            gsap.fromTo("#flash", {opacity: 1}, {opacity: 0, duration: 0.5, ease: "power2.out"});
        }

        // --- INTERACTION ---
        const inputField = document.getElementById('neural-input');
        
        inputField.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                const text = inputField.value.trim();
                if(text.length > 0) {
                    textToParticles(text);
                    inputField.value = ''; // Leeg veld
                    inputField.blur();     // Haal focus weg
                } else {
                    // Als het leeg is, herstel de chaos
                    textToParticles("CHAOS");
                }
            }
        });

        // Initialize met een standaardwoord
        setTimeout(() => textToParticles("AWAKE"), 1000);

        // --- MOUSE REPULSION PHYSICS (Magnetic effect) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let mouse3D = new THREE.Vector3(0,0,0);

        window.addEventListener('mousemove', (event) => {
            // Map muis naar WebGL coördinaten (-1 tot +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // Projecteer muis in 3D ruimte (op Z = 0)
            mouse3D.set(mouse.x, mouse.y, 0.5);
            mouse3D.unproject(camera);
            mouse3D.sub(camera.position).normalize();
            const distance = -camera.position.z / mouse3D.z;
            mouse3D.copy(camera.position).add(mouse3D.multiplyScalar(distance));
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            const time = clock.getElapsedTime();
            const positionsArr = particlesMesh.geometry.attributes.position.array;

            // LERP (Lineaire Interpolatie) - Beweeg huidige positie naar doelpositie
            for(let i = 0; i < particleCount; i++) {
                const px = positionsArr[i*3];
                const py = positionsArr[i*3+1];
                const pz = positionsArr[i*3+2];

                let tx = targetPositions[i*3];
                let ty = targetPositions[i*3+1];
                let tz = targetPositions[i*3+2];

                // FYSICA: Muis Afstoting (Repulsion force)
                const dx = mouse3D.x - px;
                const dy = mouse3D.y - py;
                const distSq = dx*dx + dy*dy;
                
                const interactionRadius = 2500; // Hoe groot is de muis cirkel?
                if(distSq < interactionRadius) {
                    const force = (interactionRadius - distSq) / interactionRadius;
                    // Duw deeltjes weg van de muis
                    tx -= (dx / Math.sqrt(distSq)) * force * 50;
                    ty -= (dy / Math.sqrt(distSq)) * force * 50;
                    tz += force * 50;
                }

                // Voeg een beetje continue "ademhaling" (noise) toe
                tx += Math.sin(time * 2 + i) * 0.5;
                ty += Math.cos(time * 2 + i) * 0.5;

                // Beweeg deeltje soepel naar zijn target (easing)
                positionsArr[i*3] += (tx - px) * 0.05;
                positionsArr[i*3+1] += (ty - py) * 0.05;
                positionsArr[i*3+2] += (tz - pz) * 0.05;
            }

            particlesMesh.geometry.attributes.position.needsUpdate = true;
            
            // Laat de hele wolk heel langzaam draaien voor diepte effect
            particlesMesh.rotation.y = Math.sin(time * 0.2) * 0.1;
            particlesMesh.rotation.x = Math.cos(time * 0.2) * 0.1;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // Responsive design
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
