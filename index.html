<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Idea Generator | mertalp.me</title>
  <meta
    name="description"
    content="Generate random startup ideas instantly. A free business idea generator for founders, entrepreneurs and makers."
  />
  <meta property="og:title" content="Business Idea Generator | mertalp.me" />
  <meta
    property="og:description"
    content="Generate random startup ideas instantly. A free business idea generator for founders, entrepreneurs and makers."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mertalp.me/" />
  <meta property="og:site_name" content="mertalp.me" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Business Idea Generator | mertalp.me" />
  <meta
    name="twitter:description"
    content="Generate random startup ideas instantly. A free business idea generator for founders, entrepreneurs and makers."
  />
  <link rel="canonical" href="https://mertalp.me/" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">mertalp.me</p>
      <h1>Business Idea Generator</h1>
      <p class="subtitle">Instant startup ideas for entrepreneurs and makers</p>
    </header>

    <main class="generator" aria-labelledby="idea-heading">
      <section class="idea-card" aria-live="polite">
        <div class="card-header">
          <span class="card-badge">Fresh idea</span>
          <span class="card-shortcut">Press <kbd>Space</kbd> to generate</span>
        </div>

        <h2 id="idea-heading" class="visually-hidden">Generated business idea</h2>
        <p id="ideaText" class="idea-text">
          An AI platform that helps dentists manage patient appointments automatically.
        </p>

        <div class="actions">
          <button id="generateButton" class="button button-primary" type="button">
            Generate new idea
          </button>
          <button id="copyButton" class="button button-secondary" type="button">
            Copy idea
          </button>
          <a
            id="shareButton"
            class="button button-secondary"
            href="https://twitter.com/intent/tweet"
            target="_blank"
            rel="noopener noreferrer"
          >
            Share on Twitter/X
          </a>
        </div>

        <p class="combination-note">1000+ possible combinations</p>
        <p id="statusText" class="status-text" role="status" aria-live="polite"></p>
      </section>
    </main>

    <footer class="footer">
      <p>Built on mertalp.me</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
