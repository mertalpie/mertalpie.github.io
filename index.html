<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI // SOLAR SYSTEM OVERRIDE</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #00f0ff; font-family: 'Space Mono', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; cursor: crosshair; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; padding: 2rem;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.5); padding: 15px 30px;
            border: 1px solid rgba(0, 240, 255, 0.3); backdrop-filter: blur(10px);
            border-radius: 8px; box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
        }

        .btn-reset {
            pointer-events: auto;
            background: transparent; border: 1px solid #00f0ff; color: #00f0ff;
            padding: 8px 15px; font-family: 'Space Mono', monospace;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-reset:hover { background: #00f0ff; color: #000; box-shadow: 0 0 15px #00f0ff; }

        .data-panel {
            position: absolute; bottom: 2rem; right: 2rem; text-align: right;
            font-size: 0.8rem; line-height: 2; color: rgba(255, 255, 255, 0.6);
        }
        .data-panel span { color: #fff; font-weight: bold; }
        .target-name { font-size: 1.5rem; color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }

        .controls-hint {
            position: absolute; bottom: 2rem; left: 2rem;
            font-size: 0.8rem; color: #fff; opacity: 0.5; line-height: 1.8;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <header>
            <div>SYSTEM: <span style="color: #fff;">SOLAR TRACKING MATRIX</span></div>
            <button class="btn-reset" onclick="resetView()">[ ZOOM OUT TO SUN ]</button>
        </header>
        <div class="controls-hint">
            [ CLICK PLANET: AUTO-FOCUS ]<br>
            [ SCROLL: MANUAL ZOOM ]<br>
            [ DRAG: ORBIT CAMERA ]
        </div>
        <div class="data-panel">
            TARGET DETECTED:<br>
            <span class="target-name" id="target-name">SUN</span><br>
            SYSTEM STATUS: <span>ACTIVE</span>
        </div>
    </div>

    <script>
        // --- 1. CORE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(0, 150, 300); // Start ver uitgezoomd

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 800;

        const textureLoader = new THREE.TextureLoader();

        // --- 2. ENVIRONMENT (STARS & LIGHT) ---
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        // De zon geeft licht
        const sunLight = new THREE.PointLight(0xffffff, 2, 1000);
        scene.add(sunLight);

        // Sterrenhemel
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(5000 * 3);
        for(let i=0; i < 5000 * 3; i++) starsPos[i] = (Math.random() - 0.5) * 2000;
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.5, transparent: true, opacity: 0.8})));

        // --- 3. THE PLANETS FACTORY ---
        const planets = [];
        const interactiveObjects = []; // Hier slaan we alles op waar je op kunt klikken

        // Bouw de ZON
        const sunGeo = new THREE.SphereGeometry(15, 64, 64);
        const sunMat = new THREE.MeshBasicMaterial({ 
            color: 0xffcc00, 
            map: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/sun.jpg') // Fallback is color
        });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.name = "SUN";
        scene.add(sun);
        interactiveObjects.push(sun);

        // Functie om planeten te genereren
        function createPlanet(name, size, distance, speed, textureUrl, color, hasRings = false) {
            // Container voor de planeet (handig voor rotatie rond de zon)
            const pivot = new THREE.Object3D();
            scene.add(pivot);

            // De planeet zelf
            const geo = new THREE.SphereGeometry(size, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ 
                color: color,
                map: textureUrl ? textureLoader.load(textureUrl) : null,
                roughness: 0.6
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.x = distance;
            mesh.name = name;
            pivot.add(mesh);
            
            // Raycaster target
            interactiveObjects.push(mesh);

            // Orbit Lijn (zodat je de ringen rond de zon ziet)
            const orbitGeo = new THREE.RingGeometry(distance - 0.2, distance + 0.2, 64);
            const orbitMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1, side: THREE.DoubleSide });
            const orbit = new THREE.Mesh(orbitGeo, orbitMat);
            orbit.rotation.x = Math.PI / 2; // Leg hem plat
            scene.add(orbit);

            // Ringen voor Saturnus
            if (hasRings) {
                const ringGeo = new THREE.RingGeometry(size * 1.4, size * 2.2, 64);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0xcda482, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2 + 0.3; // Iets gekanteld
                mesh.add(ring);
            }

            planets.push({ pivot, mesh, speed });
            return mesh;
        }

        // Genereer het zonnestelsel (Schaal is aangepast voor zichtbaarheid!)
        // Parameters: Naam, Grootte, Afstand tot zon, Rotatiesnelheid, Texture, Fallback Kleur
        createPlanet("MERCURY", 2, 25, 0.02, null, 0x888888);
        createPlanet("VENUS", 3, 40, 0.015, null, 0xe3bb76);
        
        // Aarde met high-res texture
        createPlanet("EARTH", 3.5, 60, 0.01, 'https://s3-us-west-2.amazonaws.com/s.cdpn.io/141228/earthmap1k.jpg', 0x2233ff);
        
        createPlanet("MARS", 2.5, 80, 0.008, null, 0xc1440e);
        createPlanet("JUPITER", 8, 120, 0.002, null, 0xd39c7e);
        createPlanet("SATURN", 6, 170, 0.0015, null, 0xe2bf7d, true); // Has rings!
        createPlanet("URANUS", 4, 220, 0.001, null, 0x4b70dd);
        createPlanet("NEPTUNE", 4, 260, 0.0008, null, 0x274687);

        // --- 4. RAYCASTING (KLIKKEN OP PLANETEN) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let focusedObject = sun; // Start gefocust op de zon
        const targetNameUI = document.getElementById('target-name');

        window.addEventListener('click', (event) => {
            // Bereken muispositie in -1 tot +1 (WebGL coördinaten)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Check of we planeten raken
            const intersects = raycaster.intersectObjects(interactiveObjects);

            if (intersects.length > 0) {
                const clickedObj = intersects[0].object;
                focusOnTarget(clickedObj);
            }
        });

        // Functie om camera naar object te animeren
        function focusOnTarget(target) {
            focusedObject = target;
            targetNameUI.innerText = target.name;

            // Bepaal hoever de camera moet inzoomen op basis van de grootte van de planeet
            const objSize = target.geometry.parameters.radius || 15;
            const offsetDist = objSize * 4; // Zoom afstand

            // Pak de absolute wereld-coördinaten van de planeet (omdat ze in een draaiende pivot zitten)
            const targetPos = new THREE.Vector3();
            target.getWorldPosition(targetPos);

            // GSAP Camera vlucht
            gsap.to(camera.position, {
                x: targetPos.x + offsetDist,
                y: targetPos.y + offsetDist / 2,
                z: targetPos.z + offsetDist,
                duration: 1.5,
                ease: "power3.inOut"
            });
        }

        // Reset knop functionaliteit
        window.resetView = function() {
            focusedObject = sun;
            targetNameUI.innerText = "OVERVIEW";
            gsap.to(camera.position, { x: 0, y: 200, z: 350, duration: 2, ease: "power3.inOut" });
            gsap.to(controls.target, { x: 0, y: 0, z: 0, duration: 2, ease: "power3.inOut" });
        }

        // --- 5. ANIMATIE LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Laat planeten draaien rond de zon
            planets.forEach(p => {
                p.pivot.rotation.y += p.speed; // Orbit
                p.mesh.rotation.y += 0.01;     // Eigen as
            });

            // Laat de zon zelf langzaam draaien
            sun.rotation.y += 0.002;

            // Als we gefocust zijn op een planeet, moet de camera "OrbitControls" het target blijven volgen
            if (focusedObject) {
                const targetPos = new THREE.Vector3();
                focusedObject.getWorldPosition(targetPos);
                
                // Soepele volgbeweging
                controls.target.lerp(targetPos, 0.1);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
